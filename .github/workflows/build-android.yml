name: Build Android

on:
  push:
    tags:
      - 'v*'   # ← v1.0.0 みたいなタグで発火

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: .NETインストール
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: MAUIワークロード
        run: dotnet workload install maui

      - name: Android SDK準備（念のため）
        run: dotnet workload install android

      - name: ビルド（APK）
        run: dotnet publish -f net10.0-android -c Release -o publish/android /p:AndroidPackageFormat=apk

      - name: 成果物アップロード
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: publish/android