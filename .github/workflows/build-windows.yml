name: Build Windows

on:
  push:
    tags:
      - 'v*'   # ← v1.0.0 みたいなタグで発火

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: .NETインストール
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: MAUIワークロード
        run: dotnet workload install maui

      - name: ビルド
        run: dotnet publish -f net10.0-windows10.0.19041.0 -c Release -o publish/windows

      - name: 成果物アップロード
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: publish/windows